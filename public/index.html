<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="main.js"></script>
</head>

<body>
    <div class="topbar">
        <input type="file" id="json-file-input" style="display: none;"/>
        <label for="srt-file-input-left" style="display: none;">Pick first .srt file</label>
        <input type="file" id="srt-file-input-left" style="display: none;"/>
        <label for="srt-file-input-right" style="display: none;">Pick second .srt file</label>
        <input type="file" id="srt-file-input-right" style="display: none;"/>
        <div class="bar-option">Load
            <div id="load-srt" class="bar-option-expand">.srt</div>
            <div id="load-json" class="bar-option-expand">.json</div>
        </div>
        <div class="bar-option">Save
            <div id="save-srt" class="bar-option-expand">.srt</div>
            <div id="save-json" class="bar-option-expand">.json</div>
        </div>
        <div class="bar-option">Add</div>
        <div class="bar-option">Delete</div>
        <div class="progress-bar" id="progress-bar">0%</div>
    </div>
    <div id="srtContainer">
        <div id="left"></div>
        <div id="right"></div>
    </div>
</body>

</html>
